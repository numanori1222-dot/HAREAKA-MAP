<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>晴あか 営業先マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Helvetica Neue",Arial,sans-serif;background:#0f172a;color:#e2e8f0;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
#header{padding:12px 16px 8px;background:#0f172a;border-bottom:1px solid #1e293b;flex-shrink:0;}
#header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.app-sub{font-size:10px;color:#6366f1;font-weight:700;letter-spacing:.1em;}
.app-title{font-size:17px;font-weight:800;color:#f1f5f9;}
.stats{display:flex;gap:14px;}
.stat{text-align:center;}
.stat-val{font-size:20px;font-weight:800;}
.stat-label{font-size:10px;color:#64748b;}
#filters{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;}
.fb{padding:4px 10px;border-radius:20px;border:1.5px solid #334155;background:transparent;color:#64748b;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.fb.az{border-color:#6366f1;background:rgba(99,102,241,.15);color:#a5b4fc;font-weight:700;}
.fb.at{border-color:#8b5cf6;background:rgba(139,92,246,.15);color:#c4b5fd;font-weight:700;}
.fb.as{border-color:#f59e0b;background:rgba(245,158,11,.15);color:#fcd34d;font-weight:700;}
.fdiv{width:1px;background:#334155;flex-shrink:0;margin:2px;}
#tabs{display:flex;background:#0f172a;border-bottom:1px solid #1e293b;flex-shrink:0;}
.tab-btn{flex:1;padding:10px;border:none;background:none;color:#64748b;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;}
.tab-btn.active{color:#6366f1;font-weight:800;border-bottom-color:#6366f1;}
#content{flex:1;overflow:hidden;position:relative;}
#map-view,#list-view{position:absolute;inset:0;}
#map-view.hidden,#list-view.hidden{display:none;}
#map{width:100%;height:100%;}
#list-view{overflow-y:auto;padding:0 0 80px;}
.zh{padding:14px 16px 6px;font-size:12px;font-weight:700;letter-spacing:.08em;display:flex;align-items:center;gap:8px;}
.zc{background:#1e293b;border-radius:10px;padding:2px 8px;font-size:11px;}
.fc{margin:0 12px 6px;background:#1e293b;border-radius:12px;padding:12px 14px;cursor:pointer;transition:background .15s;border-left:4px solid;}
.fc:hover{background:#263548;}
.tbadge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:4px;}
.fname{font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:3px;}
.faddr{font-size:11px;color:#64748b;}
.ftel{font-size:11px;color:#4ade80;margin-top:2px;}
.fright{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-left:8px;flex-shrink:0;}
.sbadge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
.vcnt{font-size:10px;color:#64748b;}
.dbadge{font-size:10px;color:#94a3b8;background:#0f172a;padding:2px 6px;border-radius:8px;}
.cinfo{margin-top:6px;padding:5px 9px;background:#0f172a;border-radius:7px;font-size:11px;color:#94a3b8;}
#mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
#mo.hidden{display:none;}
#modal{width:100%;max-width:520px;max-height:90vh;overflow-y:auto;background:#0f172a;border-radius:16px;border:1px solid #1e293b;box-shadow:0 25px 50px rgba(0,0,0,.5);}
.mh{padding:18px 20px 0;border-bottom:1px solid #1e293b;}
.mzt{font-size:11px;font-weight:700;margin-bottom:4px;}
.mn{font-size:17px;font-weight:700;color:#f1f5f9;line-height:1.3;}
.ma{font-size:12px;color:#64748b;margin-top:3px;}
.msr{display:flex;gap:6px;padding:10px 0 14px;flex-wrap:wrap;}
.msb{padding:4px 10px;border-radius:20px;border:1.5px solid #334155;background:transparent;color:#64748b;font-size:12px;cursor:pointer;}
.msb.active{font-weight:700;}
.mtabs{display:flex;}
.mtb{flex:1;padding:9px 0;border:none;background:none;color:#64748b;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;}
.mtb.active{color:#6366f1;font-weight:700;border-bottom-color:#6366f1;}
.mb{padding:20px;}
.mf{padding:0 20px 20px;display:flex;gap:10px;}
.fl{font-size:10px;color:#64748b;margin-bottom:3px;display:block;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
input[type=text],input[type=date],textarea,input[type=tel]{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit;}
textarea{resize:vertical;}
.cb{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:8px;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.badd{width:100%;padding:8px;border:1px dashed #334155;border-radius:8px;background:none;color:#64748b;cursor:pointer;font-size:13px;margin-bottom:14px;}
.brm{padding:6px 10px;border-radius:8px;border:none;background:rgba(239,68,68,.15);color:#ef4444;cursor:pointer;font-size:15px;}
.vib{background:#1e293b;border-radius:10px;padding:12px;margin-bottom:14px;}
.bav{width:100%;padding:8px;border-radius:8px;border:none;background:#6366f1;color:#fff;cursor:pointer;font-weight:700;font-size:13px;margin-top:8px;}
.vr{background:#1e293b;border-radius:10px;padding:11px;margin-bottom:7px;border-left:3px solid #6366f1;}
.vd{font-size:12px;color:#6366f1;font-weight:700;margin-bottom:3px;}
.vn{font-size:13px;color:#cbd5e1;white-space:pre-wrap;}
.cpa{border:2px dashed #334155;border-radius:12px;padding:20px;text-align:center;margin-bottom:14px;cursor:pointer;background:#1e293b;}
.cpa img{max-width:100%;max-height:200px;border-radius:8px;object-fit:contain;}
.bcancel{flex:1;padding:10px;border-radius:10px;border:1px solid #334155;background:none;color:#94a3b8;cursor:pointer;font-size:14px;}
.bsave{flex:2;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;cursor:pointer;font-size:14px;font-weight:700;}
.empty{text-align:center;color:#475569;padding:24px;}

<style>
.area-tooltip {
  background: rgba(15,23,42,0.92);
  border: 1px solid #334155;
  border-radius: 8px;
  color: #e2e8f0;
  font-size: 12px;
  padding: 6px 10px;
  line-height: 1.5;
}
.area-tooltip small {
  color: #94a3b8;
  font-size: 10px;
}
</style>
</style>
</head>
<body>
<div id="header">
  <div id="header-top">
    <div><div class="app-sub">HAREAKA SALES</div><div class="app-title">営業先マップ</div></div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="sv-total" style="color:#6366f1">0</div><div class="stat-label">総件数</div></div>
      <div class="stat"><div class="stat-val" id="sv-visited" style="color:#f59e0b">0</div><div class="stat-label">訪問済</div></div>
      <div class="stat"><div class="stat-val" id="sv-active" style="color:#22c55e">0</div><div class="stat-label">紹介あり</div></div>
    </div>
  </div>
  <div id="filters">
    <button class="fb az" data-zone="all" id="fz-all">全て</button>
    <button class="fb" data-zone="1" id="fz-1">〜1km</button>
    <button class="fb" data-zone="2" id="fz-2">1〜3km</button>
    <button class="fb" data-zone="3" id="fz-3">3〜5km</button>
    <div class="fdiv"></div>
    <button class="fb at" data-type="all" id="ft-all">全種別</button>
    <button class="fb" data-type="居宅介護支援" id="ft-k">居宅</button>
    <button class="fb" data-type="地域包括" id="ft-p">地域包括</button>
    <div class="fdiv"></div>
    <button class="fb as" data-st="all" id="fs-all">全状況</button>
    <button class="fb" data-st="unvisited" id="fs-u">未接触</button>
    <button class="fb" data-st="contacted" id="fs-c">接触済</button>
    <button class="fb" data-st="relationship" id="fs-r">構築中</button>
    <button class="fb" data-st="active" id="fs-a">紹介あり</button>
  </div>
</div>
<div id="tabs">
  <button class="tab-btn active" id="tab-map">&#x1F5FA; マップ</button>
  <button class="tab-btn" id="tab-list">&#x1F4CB; 一覧</button>
</div>
<div id="content">
  <div id="map-view"><div id="map"></div></div>
  <div id="list-view" class="hidden"></div>
</div>
<div id="mo" class="hidden">
  <div id="modal">
    <div class="mh">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="flex:1"><div class="mzt" id="m-zt"></div><div class="mn" id="m-name"></div><div class="ma" id="m-addr"></div></div>
        <button id="btn-close-modal" style="background:none;border:none;color:#64748b;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0">&#x2715;</button>
      </div>
      <div class="msr" id="m-sr"></div>
      <div class="mtabs">
        <button class="mtb active" data-mt="info">&#x1F4CB; 基本情報</button>
        <button class="mtb" data-mt="visits">&#x1F5D3; 訪問記録</button>
        <button class="mtb" data-mt="card">&#x1F4C7; 名刺</button>
      </div>
    </div>
    <div class="mb" id="m-body"></div>
    <div class="mf">
      <button class="bcancel" id="btn-cancel">キャンセル</button>
      <button class="bsave" id="btn-save">保存する</button>
    </div>
  </div>
</div>

function fil(){
  return FACS.filter(function(f){
    if(fz!=="all" && f.zone!==Number(fz)) return false;
    if(ft!=="all" && f.type!==ft) return false;
    if(fs!=="all"){var s=(cards[f.id]&&cards[f.id].status)||"unvisited"; if(s!==fs) return false;}
    return true;
  });
}

function mkIcon(f){
  var c=cards[f.id], status=(c&&c.status)||"unvisited", sc=SC[status];
  var hv=c&&c.visits&&c.visits.length>0;
  var badge=hv?"<div style='position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:7px;color:#6366f1;font-weight:800'>&#10003;</div>":"";
  if(f.type==="地域包括"){
    return L.divIcon({
      html:"<div style='position:relative;width:26px;height:26px'><div style='width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-bottom:24px solid "+sc.color+";filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))'></div>"+badge+"</div>",
      className:"",iconSize:[26,26],iconAnchor:[13,24]
    });
  }
  return L.divIcon({
    html:"<div style='position:relative;width:22px;height:22px'><div style='width:18px;height:18px;border-radius:50%;background:"+sc.color+";border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);margin:2px'></div>"+badge+"</div>",
    className:"",iconSize:[22,22],iconAnchor:[11,11]
  });
}

function refreshMap(){
  if(!map) return;
  Object.values(markers).forEach(function(m){map.removeLayer(m);});
  markers={};
  fil().forEach(function(f){
    var m=L.marker([f.lat,f.lng],{icon:mkIcon(f)});
    m.on("click",function(){openModal(f.id);});
    var c=cards[f.id], st=(c&&c.status)||"unvisited", sc=SC[st];
    var vt=(c&&c.visits&&c.visits.length>0)?" · "+c.visits.length+"回訪問":"";
    m.bindTooltip(
      "<div style='font-size:12px;line-height:1.6'><b>"+f.name+"</b><br><span style='color:#64748b'>"+f.type+" · "+ZL[f.zone]+(f.dist?" · "+f.dist+"km":"")+"</span><br><span style='color:"+sc.color+"'>"+sc.label+vt+"</span></div>",
      {direction:"top",offset:[0,-6]}
    );
    m.addTo(map);
    markers[f.id]=m;
  });
}

// 一覧
function renderList(){
  var el=document.getElementById("list-view");
  var html="";
  [1,2,3].forEach(function(z){
    var items=fil().filter(function(f){return f.zone===z;});
    if(!items.length) return;
    html+="<div class='zh' style='color:"+ZC[z]+"'>"+ZL[z]+" <span class='zc' style='color:"+ZC[z]+"'>"+items.length+"件</span></div>";
    items.forEach(function(f){
      var c=cards[f.id], st=(c&&c.status)||"unvisited", sc=SC[st];
      var vc=(c&&c.visits&&c.visits.length)||0;
      var cn=(c&&c.contacts&&c.contacts[0]&&c.contacts[0].name)||"";
      var cr=(c&&c.contacts&&c.contacts[0]&&c.contacts[0].role)||"";
      var tc=f.type==="地域包括"?"#8b5cf6":"#3b82f6";
      html+="<div class='fc' style='border-left-color:"+ZC[f.zone]+"' data-fid='"+f.id+"'>"
        +"<div style='display:flex;justify-content:space-between;align-items:flex-start'>"
        +"<div style='flex:1;min-width:0'><span class='tbadge' style='background:"+tc+"22;color:"+tc+"'>"+f.type+"</span>"
        +"<div class='fname'>"+f.name+"</div><div class='faddr'>"+f.address+"</div>"
        +(f.tel?"<div class='ftel'>&#128222; "+f.tel+"</div>":"")+"</div>"
        +"<div class='fright'><span class='sbadge' style='background:"+sc.bg+";color:"+sc.color+"'>"+sc.label+"</span>"
        +(vc>0?"<span class='vcnt'>&#128197; "+vc+"回</span>":"")
        +(f.dist?"<span class='dbadge'>"+f.dist+"km</span>":"")+"</div></div>"
        +(cn?"<div class='cinfo'>&#128100; "+cn+(cr?" ("+cr+")":"")+"</div>":"")+"</div>";
    });
  });
  el.innerHTML=html||"<div class='empty'>条件に一致する事業所がありません</div>";
  el.querySelectorAll("[data-fid]").forEach(function(el){
    el.addEventListener("click",function(){openModal(this.getAttribute("data-fid"));});
  });
}

// モーダル
var curFid=null, curMTab="info", md={};
document.getElementById("btn-close-modal").addEventListener("click", closeModal);
document.getElementById("btn-cancel").addEventListener("click", closeModal);
document.getElementById("btn-save").addEventListener("click", saveCard);
document.getElementById("mo").addEventListener("click", function(ev){if(ev.target===this) closeModal();});
document.querySelectorAll(".mtb").forEach(function(b){
  b.addEventListener("click", function(){
    document.querySelectorAll(".mtb").forEach(function(x){x.classList.remove("active");});
    this.classList.add("active");
    renderMBody(this.getAttribute("data-mt"));
  });
});

function openModal(id){
  curFid=id;
  var f=FACS.find(function(x){return x.id===id;}), c=cards[id]||{};
  md={
    status:c.status||"unvisited",
    contacts:c.contacts?JSON.parse(JSON.stringify(c.contacts)):[{name:"",role:"",tel:""}],
    visits:c.visits?JSON.parse(JSON.stringify(c.visits)):[],
    memo:c.memo||"", cardPhoto:c.cardPhoto||null,
    nvd:new Date().toISOString().slice(0,10), nvn:""
  };
  document.getElementById("m-zt").textContent=ZL[f.zone]+" · "+f.type;
  document.getElementById("m-zt").style.color=ZC[f.zone];
  document.getElementById("m-name").textContent=f.name;
  document.getElementById("m-addr").textContent=f.address+(f.tel?" · "+f.tel:"")+(f.dist?" ("+f.dist+"km)":"");
  renderSR();
  document.querySelectorAll(".mtb").forEach(function(b,i){b.classList.toggle("active",i===0);});
  renderMBody("info");
  document.getElementById("mo").classList.remove("hidden");
}
function renderSR(){
  document.getElementById("m-sr").innerHTML=Object.keys(SC).map(function(k){
    var v=SC[k], isA=md.status===k;
    return "<button class='msb"+(isA?" active":"")+"' style='"+(isA?"border-color:"+v.color+";background:"+v.bg+";color:"+v.color:"")+"' data-sk='"+k+"'>"+v.label+"</button>";
  }).join("");
  document.getElementById("m-sr").querySelectorAll("[data-sk]").forEach(function(b){
    b.addEventListener("click",function(){md.status=this.getAttribute("data-sk"); renderSR();});
  });
}
function renderMBody(t){
  curMTab=t;
  var body=document.getElementById("m-body");
  if(t==="info"){
    var ch=md.contacts.map(function(c,i){
      return "<div class='cb'><div class='cg'>"
        +"<div><label class='fl'>名前</label><input type='text' value='"+esc(c.name)+"' placeholder='山田 太郎' data-ci='"+i+"' data-cf='name'></div>"
        +"<div><label class='fl'>役職</label><input type='text' value='"+esc(c.role)+"' placeholder='ケアマネ' data-ci='"+i+"' data-cf='role'></div>"
        +"</div><label class='fl'>直通電話</label><div style='display:flex;gap:6px'>"
        +"<input type='tel' value='"+esc(c.tel)+"' placeholder='03-xxxx-xxxx' data-ci='"+i+"' data-cf='tel'>"
        +(md.contacts.length>1?"<button class='brm' data-ri='"+i+"'>&#10005;</button>":"")
        +"</div></div>";
    }).join("");
    body.innerHTML="<label class='fl'>担当者情報</label>"+ch
      +"<button class='badd' id='btn-addC'>＋ 担当者を追加</button>"
      +"<label class='fl'>メモ・特記事項</label>"
      +"<textarea id='txt-memo' rows='4' placeholder='特徴、関係性、次のアクションなど...'>"+esc(md.memo)+"</textarea>";
    body.querySelectorAll("[data-ci]").forEach(function(inp){
      inp.addEventListener("change",function(){md.contacts[Number(this.getAttribute("data-ci"))][this.getAttribute("data-cf")]=this.value;});
    });
    body.querySelectorAll("[data-ri]").forEach(function(btn){
      btn.addEventListener("click",function(){md.contacts.splice(Number(this.getAttribute("data-ri")),1); renderMBody("info");});
    });
    document.getElementById("btn-addC").addEventListener("click",function(){md.contacts.push({name:"",role:"",tel:""}); renderMBody("info");});
    document.getElementById("txt-memo").addEventListener("change",function(){md.memo=this.value;});
  } else if(t==="visits"){
    var vh=md.visits.slice().reverse().map(function(v){
      return "<div class='vr'><div class='vd'>"+v.date+"</div><div class='vn'>"+esc(v.note)+"</div></div>";
    }).join("")||"<div class='empty'>まだ訪問記録がありません</div>";
    body.innerHTML="<div class='vib'>"
      +"<label class='fl'>訪問日</label><input type='date' id='inp-vd' value='"+md.nvd+"' style='margin-bottom:8px'>"
      +"<label class='fl'>面談メモ</label><textarea id='inp-vn' rows='3' placeholder='話した内容、反応、次のアクションなど...'>"+esc(md.nvn)+"</textarea>"
      +"<button class='bav' id='btn-addV'>＋ 記録を追加</button></div>"+vh;
    document.getElementById("inp-vd").addEventListener("change",function(){md.nvd=this.value;});
    document.getElementById("inp-vn").addEventListener("change",function(){md.nvn=this.value;});
    document.getElementById("btn-addV").addEventListener("click",function(){
      var note=document.getElementById("inp-vn").value;
      if(!note.trim()){alert("面談メモを入力してください"); return;}
      md.visits.push({date:md.nvd,note:note,id:Date.now()}); md.nvn=""; renderMBody("visits");
    });
  } else {
    var ph=md.cardPhoto?"<img src='"+md.cardPhoto+"' alt='名刺'>"
      :"<div style='color:#475569'><div style='font-size:32px;margin-bottom:8px'>&#x1F4C7;</div><div style='font-size:13px'>タップして名刺写真を追加</div></div>";
    body.innerHTML="<div class='cpa' id='cpa-area'>"+ph+"</div><input type='file' id='pi' accept='image/*' style='display:none'>"
      +(md.cardPhoto?"<button id='btn-delPhoto' style='width:100%;padding:8px;border:1px solid #ef4444;border-radius:8px;background:none;color:#ef4444;cursor:pointer;font-size:13px'>写真を削除</button>":"");
    document.getElementById("cpa-area").addEventListener("click",function(){document.getElementById("pi").click();});
    document.getElementById("pi").addEventListener("change",function(){
      var file=this.files[0]; if(!file) return;
      var reader=new FileReader();
      reader.onload=function(ev){md.cardPhoto=ev.target.result; renderMBody("card");};
      reader.readAsDataURL(file);
    });
    var dp=document.getElementById("btn-delPhoto");
    if(dp) dp.addEventListener("click",function(){md.cardPhoto=null; renderMBody("card");});
  }
}
function saveCard(){
  if(!curFid) return;
  cards[curFid]={status:md.status,contacts:md.contacts,visits:md.visits,memo:md.memo,cardPhoto:md.cardPhoto};
  save(); updateStats(); refreshMap(); if(curTab==="list") renderList(); closeModal();
}
function closeModal(){document.getElementById("mo").classList.add("hidden"); curFid=null;}
function updateStats(){
  var total=FACS.filter(function(f){return f.zone<=3;}).length;
  var vals=Object.values(cards);
  document.getElementById("sv-total").textContent=total;
  document.getElementById("sv-visited").textContent=vals.filter(function(c){return c.visits&&c.visits.length>0;}).length;
  document.getElementById("sv-active").textContent=vals.filter(function(c){return c.status==="active";}).length;
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

load(); updateStats(); initMap();
</script>
</body>
</html>
